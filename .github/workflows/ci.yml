name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Service containers publish on localhost; 5433 matches local dev config.
      DATABASE_URL: postgresql://concurrenseat:concurrenseat@localhost:5433/concurrenseat
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: concurrenseat
          POSTGRES_PASSWORD: concurrenseat
          POSTGRES_DB: concurrenseat
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U concurrenseat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        run: alembic upgrade head
      - name: Unit tests
        run: pytest tests/unit -q
      - name: Concurrency tests (500 buyers vs 100 tickets, all strategies)
        run: pytest tests/concurrency -q
      - name: Coverage report
        run: pytest --cov=app --cov-report=term -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check and build
        run: npm run build
